version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: note_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notesdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - note_network

  app:
    build: .
    container_name: note_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://user:password@db:5432/notesdb
    depends_on:
      - db
    networks:
      - note_network

